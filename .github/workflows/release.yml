name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.13"
  NODE_VERSION: "24"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-backend:
    name: Build backend sidecar (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: astral-sh/setup-uv@v8.1.0

      - uses: dtolnay/rust-toolchain@stable

      - name: Install backend dependencies
        run: cd backend && uv sync --dev

      - name: Audit backend dependencies
        run: cd backend && uv run --with pip-audit pip-audit

      - name: Install Playwright Chromium runtime
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $env:PLAYWRIGHT_BROWSERS_PATH = "..\src-tauri\resources\bin\ms-playwright"
          cd backend
          uv run python -m playwright install chromium

      - name: Build sidecar with PyInstaller
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          Remove-Item -Path src-tauri\resources\backend -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item -Path src-tauri\resources\backend.exe -Force -ErrorAction SilentlyContinue
          cd backend
          uv run pyinstaller backend.spec --distpath ..\src-tauri\resources\backend --noconfirm --clean
          cd ..

          $triple = (rustc -vV | Select-String "host:").ToString().Split()[1].Trim()
          $src = "src-tauri\resources\backend\backend.exe"
          $dst = "src-tauri\resources\backend\backend-$triple.exe"

          if (-not (Test-Path $src)) {
            throw "Expected sidecar was not created: $src"
          }
          Copy-Item $src $dst -Force
          Write-Host "Sidecar ready: $dst"

      - name: List sidecar output
        shell: pwsh
        run: |
          Write-Host "Sidecar directory:"
          Get-ChildItem -Path src-tauri\resources\backend\ -Recurse |
            Select-Object FullName, Length |
            Format-Table -AutoSize
          $total = (Get-ChildItem -Path src-tauri\resources\backend\ -Recurse -File |
            Measure-Object -Property Length -Sum).Sum / 1MB
          Write-Host "Total size: $([math]::Round($total, 1)) MB"

      - name: Upload backend sidecar artifact
        uses: actions/upload-artifact@v7
        with:
          name: backend-sidecar-windows
          path: src-tauri/resources/backend/
          retention-days: 1

      - name: Upload browser runtime artifact
        uses: actions/upload-artifact@v7
        with:
          name: browser-runtime-windows
          path: src-tauri/resources/bin/ms-playwright/
          retention-days: 1

  build-tauri:
    name: Build Tauri installer (Windows)
    needs: build-backend
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Audit frontend dependencies
        run: npm audit --audit-level=moderate

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Download backend sidecar
        uses: actions/download-artifact@v8
        with:
          name: backend-sidecar-windows
          path: src-tauri/resources/backend/

      - name: Download browser runtime
        uses: actions/download-artifact@v8
        with:
          name: browser-runtime-windows
          path: src-tauri/resources/bin/ms-playwright/

      - name: Verify sidecar exists
        shell: pwsh
        run: |
          $triple = (rustc -vV | Select-String "host:").ToString().Split()[1].Trim()
          $sidecar = "src-tauri\resources\backend\backend-$triple.exe"
          if (-not (Test-Path $sidecar)) {
            throw "Sidecar not found at $sidecar"
          }
          $browsers = "src-tauri\resources\bin\ms-playwright"
          if (-not (Test-Path $browsers)) {
            throw "Playwright browser runtime not found at $browsers"
          }
          $browserCount = (Get-ChildItem -Path $browsers -Recurse -File).Count
          Write-Host "Sidecar verified: $sidecar ($(( Get-Item $sidecar ).Length / 1MB) MB)"
          Write-Host "Browser runtime verified: $browserCount files"

      - name: Build Tauri installer
        run: npm run package:windows

      - name: Generate release checksums
        id: checksums
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $assets = Get-ChildItem -Path "src-tauri\target\release\bundle" -Recurse -File -Include "*.exe", "*.msi" |
            Sort-Object Name
          if (-not $assets) {
            throw "No installer artifacts were produced."
          }

          $lines = foreach ($asset in $assets) {
            $hash = (Get-FileHash -Algorithm SHA256 -Path $asset.FullName).Hash.ToLowerInvariant()
            "$hash  $($asset.Name)"
          }
          $lines | Set-Content -Path "SHA256SUMS.txt" -Encoding utf8
          $version = "${{ github.ref_name }}".TrimStart("v")

          $notes = @"
          ## JustHireMe ${{ github.ref_name }}

          ### Installation
          1. Download `JustHireMe_$version_x64-setup.exe` from the assets below.
          2. Run the installer. Windows may show SmartScreen because this alpha build is not code-signed yet.
          3. If SmartScreen appears, click **More info**, then **Run anyway**.
          4. Launch JustHireMe from your Start Menu.
          5. Follow the setup wizard to configure your API keys and profile.

          > **Your data stays on your machine.** JustHireMe is local-first: no hosted backend, no tracking, and no app data leaves your computer by default.

          ### SHA256 checksums
          ````text
          $($lines -join "`n")
          ````

          ### What's inside
          - Local-first job intelligence workbench
          - Source adapters, quality gates, and transparent ranking
          - Built-in CRM for your job pipeline
          - Profile-aware graph and vector matching
          - Resume, cover letter, and outreach draft generation
          - Bundled backend sidecar and browser runtime

          ---
          _This installer was built by GitHub Actions from tag `${{ github.ref_name }}`. Having issues? [Open an issue](https://github.com/${{ github.repository }}/issues) or check the [README](https://github.com/${{ github.repository }}#readme)._
          "@
          $notes | Set-Content -Path "release-notes.md" -Encoding utf8

      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ErrorActionPreference = "Stop"
          $assets = Get-ChildItem -Path "src-tauri\target\release\bundle" -Recurse -File -Include "*.exe", "*.msi" |
            Sort-Object Name |
            ForEach-Object { $_.FullName }
          gh release create "${{ github.ref_name }}" @assets "SHA256SUMS.txt" `
            --repo "${{ github.repository }}" `
            --title "JustHireMe ${{ github.ref_name }}" `
            --notes-file "release-notes.md" `
            --latest
